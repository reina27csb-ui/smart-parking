<!DOCTYPE html>
<html>
<head>
    <title>Book Parking Slot</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f4f4f4;
        }

        .box {
            margin-top: 100px;
        }

        input {
            padding: 10px;
            width: 250px;
            margin-top: 10px;
        }

        button {
            padding: 10px 20px;
            margin-top: 15px;
            background-color: green;
            color: white;
            border: none;
            border-radius: 5px;
        }

        button:hover {
            background-color: black;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Enter Vehicle Number for Slot {{ slot_id }}</h2>

    <form method="POST">
        <input type="text" name="vehicle" placeholder="Enter vehicle number" required>
        <br>
        <button type="submit">Confirm Booking</button>
    </form>
</div>

</body>
</html>
